sonar.organization=shivanand-hulikatti
sonar.projectKey=land-services-go
sonar.projectName=land-services-go
sonar.projectVersion=1.0

# Go service code only (not Java land-services, not Postman/Docker/shell)
sonar.sources=cmd,internal,pkg
sonar.inclusions=**/*.go
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/*_test.go,**/migrations/**,**/docs/**,**/scripts/**,**/deployments/**,**/.scannerwork/**

sonar.tests=cmd,internal,pkg
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out
